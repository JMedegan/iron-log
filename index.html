<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Iron Log</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header>
            <h1>🏋️ Iron Log</h1>
            <button id="exportBtn" class="icon-btn" title="Export Data">📤</button>
        </header>

        <!-- Navigation -->
        <nav>
            <button class="nav-btn active" data-view="workout">Workout</button>
            <button class="nav-btn" data-view="history">History</button>
            <button class="nav-btn" data-view="stats">Stats</button>
            <button class="nav-btn" data-view="settings">⚙️</button>
        </nav>

        <!-- Workout View (Main) -->
        <section id="workout-view" class="view active">
            <!-- Day Selector -->
            <div class="day-selector">
                <select id="daySelect">
                    <option value="0">Day 1: Lower A (Quad Focus)</option>
                    <option value="1">Day 2: Upper A (Push Focus)</option>
                    <option value="3">Day 3: Lower B (Hip/Posterior)</option>
                    <option value="4">Day 4: Upper B (Pull Focus)</option>
                </select>
                <input type="date" id="workoutDate">
            </div>

            <!-- Warmup -->
            <div id="warmup-card" class="warmup-card">
                <span class="warmup-icon">🔥</span>
                <span id="warmup-text">Loading...</span>
            </div>

            <!-- Exercise List -->
            <div id="workout-exercises"></div>

            <!-- Finisher -->
            <div id="finisher-card" class="finisher-card" style="display:none;">
                <span class="finisher-icon">🏁</span>
                <span id="finisher-text"></span>
            </div>

            <!-- Complete Workout -->
            <button id="completeWorkout" class="complete-btn">✅ Complete Workout</button>
        </section>

        <!-- History View -->
        <section id="history-view" class="view">
            <div id="history-list"></div>
        </section>

        <!-- Stats View -->
        <section id="stats-view" class="view">
            <div class="stat-card">
                <h3>Total Workouts</h3>
                <span id="totalWorkouts">0</span>
            </div>
            <div class="stat-card">
                <h3>This Week</h3>
                <span id="weekWorkouts">0</span>
            </div>
            <div class="stat-card">
                <h3>Total Volume (kg)</h3>
                <span id="totalVolume">0</span>
            </div>
            <div class="chart-container">
                <h3>Weekly Volume</h3>
                <canvas id="volumeChart"></canvas>
            </div>
            <div id="pr-list">
                <h3>🏆 Personal Records</h3>
                <div id="prs"></div>
            </div>
        </section>

        <!-- Settings View -->
        <section id="settings-view" class="view">
            <h2>Exercises</h2>
            <input type="text" id="exerciseSearch" placeholder="Search exercises...">
            <div id="exercise-list"></div>
            <button id="addCustomExercise" class="secondary-btn">+ Add Custom Exercise</button>
            <button id="resetExercises" class="secondary-btn danger">🔄 Reset to Defaults</button>
        </section>

        <!-- Set Modal -->
        <div id="setModal" class="modal">
            <div class="modal-content">
                <h2 id="setModalTitle">Log Set</h2>
                <div class="set-history" id="setHistory"></div>
                <div class="input-group">
                    <label>Weight (kg)</label>
                    <div class="stepper">
                        <button class="stepper-btn" data-input="setWeight" data-delta="-5">-5</button>
                        <button class="stepper-btn" data-input="setWeight" data-delta="-2.5">-</button>
                        <input type="number" id="setWeight" step="0.5" min="0" value="20">
                        <button class="stepper-btn" data-input="setWeight" data-delta="2.5">+</button>
                        <button class="stepper-btn" data-input="setWeight" data-delta="5">+5</button>
                    </div>
                </div>
                <div class="input-group">
                    <label>Reps</label>
                    <div class="stepper">
                        <button class="stepper-btn" data-input="setReps" data-delta="-5">-5</button>
                        <button class="stepper-btn" data-input="setReps" data-delta="-1">-</button>
                        <input type="number" id="setReps" step="1" min="1" value="10">
                        <button class="stepper-btn" data-input="setReps" data-delta="1">+</button>
                        <button class="stepper-btn" data-input="setReps" data-delta="5">+5</button>
                    </div>
                </div>
                <div class="input-group">
                    <label>RPE (Rate of Perceived Exertion)</label>
                    <div class="rpe-selector" id="rpeSelector">
                        <button class="rpe-btn" data-rpe="6">6</button>
                        <button class="rpe-btn" data-rpe="7">7</button>
                        <button class="rpe-btn" data-rpe="8">8</button>
                        <button class="rpe-btn" data-rpe="9">9</button>
                        <button class="rpe-btn" data-rpe="10">10</button>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="secondary-btn close-modal">Cancel</button>
                    <button id="saveSet" class="primary-btn">Save Set</button>
                </div>
            </div>
        </div>

        <!-- Rest Timer Modal -->
        <div id="restModal" class="modal">
            <div class="modal-content rest-modal-content">
                <div class="rest-timer-display">
                    <span id="restTime">60</span>
                    <span class="rest-label">seconds</span>
                </div>
                <div class="rest-actions">
                    <button class="rest-btn" data-add="-15">-15s</button>
                    <button class="rest-btn" data-add="15">+15s</button>
                </div>
                <button id="skipRest" class="secondary-btn">Skip</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
</body>
</html>
